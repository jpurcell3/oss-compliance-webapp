version: '3.8'

services:
  oss-compliance-webapp:
    image: ghcr.io/jpurcell3/oss-compliance-webapp:latest
    container_name: oss-compliance-webapp
    ports:
      - "5001:5001"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - FLASK_DEBUG=${FLASK_DEBUG:-True}
      - PYTHONUNBUFFERED=1
      - SSL_VERIFY=false
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0aG7eHuzLChFUtcKQSyGACTtcVt9NKKwpGEwGBRib7E=}
      - DEBUG_LOGGING=${DEBUG_LOGGING:-true}
    volumes:
      # Mount configuration file (contains encrypted tokens)
      - ./config/app_config.yaml:/app/config/app_config.yaml
      # Mount reports directory for persistence
      - ./reports:/app/reports
      # Mount uploads directory
      - ./uploads:/app/uploads
      # Mount cache directory
      - ./cache:/app/cache
      # Mount database directory for persistence
      - ./instance:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - oss-compliance-network

networks:
  oss-compliance-network:
    driver: bridge