name: Regression Suite

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start app via Docker Compose
        run: |
          docker compose up -d --build

      - name: Wait for app
        run: |
          python - << 'PY'
          import time, requests, sys
          ok = False
          for _ in range(90):
              try:
                  r = requests.get("http://localhost:5001/", timeout=5)
                  if r.status_code == 200:
                      ok = True
                      break
              except Exception:
                  pass
              time.sleep(2)
          if not ok:
              print("App did not become ready")
              sys.exit(1)
          print("App ready")
          PY

      - name: Run regression suite (enforced)
        run: |
          python regression_suite.py --baseline regression_baseline.sample.json --output regression_results.json

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: |
            regression_results.json

      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose logs --no-color --tail=500

      - name: Teardown
        if: always()
        run: |
          docker compose down
